tasks.register('verifyReleaseEnvironment') {
    group = 'verification'
    description = 'Verifies the local Gradle and Java runtime match the pinned release build environment.'

    inputs.property('expectedReleaseJavaVersion', expectedReleaseJavaVersion)
    inputs.property('expectedReleaseJavaVendor', expectedReleaseJavaVendor)
    inputs.property('expectedReleaseGradleVersion', expectedReleaseGradleVersion)
    outputs.upToDateWhen { false }

    doLast {
        def expectedJavaVersion = expectedReleaseJavaVersion.get()
        def expectedJavaVendorValue = expectedReleaseJavaVendor.get()
        def expectedGradleVersion = expectedReleaseGradleVersion.get()
        def actualJavaVersion = System.getProperty('java.version')
        def actualJavaVendor = System.getProperty('java.vendor')
        def violations = []

        if (actualJavaVersion != expectedJavaVersion) {
            violations << "Java version expected ${expectedJavaVersion} but was ${actualJavaVersion}"
        }
        if (actualJavaVendor != expectedJavaVendorValue) {
            violations << "Java vendor expected ${expectedJavaVendorValue} but was ${actualJavaVendor}"
        }
        if (gradle.gradleVersion != expectedGradleVersion) {
            violations << "Gradle version expected ${expectedGradleVersion} but was ${gradle.gradleVersion}"
        }

        if (!violations.empty) {
            throw new GradleException("Release build environment verification failed:\n" + violations.collect { "  - ${it}" }.join('\n'))
        }

        logger.lifecycle("Verified release build environment: Gradle ${gradle.gradleVersion}, Java ${actualJavaVersion} (${actualJavaVendor}).")
    }
}

tasks.register('verifyGradleWrapperSecurity') {
    group = 'verification'
    description = 'Verifies Gradle wrapper checksums and pinned distribution metadata.'

    def wrapperFiles = files(
            'gradlew',
            'gradlew.bat',
            'gradle/wrapper/gradle-wrapper.jar',
            'gradle/wrapper/gradle-wrapper.properties'
    )

    inputs.file(gradleWrapperChecksums)
    inputs.files(wrapperFiles)
    outputs.upToDateWhen { false }

    doLast {
        def checksumFile = gradleWrapperChecksums.asFile
        if (!checksumFile.file) {
            throw new GradleException("Missing ${checksumFile}. Record the approved Gradle wrapper file checksums first.")
        }

        def requiredPaths = [
                'gradlew',
                'gradlew.bat',
                'gradle/wrapper/gradle-wrapper.jar',
                'gradle/wrapper/gradle-wrapper.properties'
        ] as Set
        def expectedHashes = new TreeMap<String, String>()
        def duplicatePaths = []

        checksumFile.eachLine(StandardCharsets.UTF_8.name()) { line, number ->
            def trimmed = line.trim()
            if (!trimmed || trimmed.startsWith('#')) {
                return
            }

            def matcher = line =~ /^([0-9a-f]{64})\s{2}(.+)$/
            if (!matcher.matches()) {
                throw new GradleException("Invalid Gradle wrapper checksum entry at ${checksumFile}:${number}. Expected '<sha256>  <path>'.")
            }

            def path = matcher.group(2)
            if (path.contains('\\') || path.startsWith('/') || path.contains('..')) {
                throw new GradleException("Invalid Gradle wrapper checksum path at ${checksumFile}:${number}: ${path}")
            }
            if (expectedHashes.put(path, matcher.group(1)) != null) {
                duplicatePaths << path
            }
        }

        def missingExpectedPaths = requiredPaths.findAll { !expectedHashes.containsKey(it) }
        def unexpectedPaths = expectedHashes.keySet().findAll { !requiredPaths.contains(it) }
        def violations = []
        if (!duplicatePaths.empty) {
            violations << "Duplicate checksum entries: ${duplicatePaths.unique().sort().join(', ')}"
        }
        if (!missingExpectedPaths.empty) {
            violations << "Missing checksum entries: ${missingExpectedPaths.sort().join(', ')}"
        }
        if (!unexpectedPaths.empty) {
            violations << "Unexpected checksum entries: ${unexpectedPaths.sort().join(', ')}"
        }

        expectedHashes.each { path, expectedHash ->
            def wrapperFile = file(path)
            if (!wrapperFile.file) {
                violations << "Missing Gradle wrapper file: ${path}"
                return
            }

            def actualHash = sha256(wrapperFile)
            if (actualHash != expectedHash) {
                violations << "${path} expected ${expectedHash} but was ${actualHash}"
            }
        }

        def wrapperProperties = loadGradleWrapperProperties()
        def distributionUrl = wrapperProperties.getProperty('distributionUrl')
        def distributionSha256Sum = wrapperProperties.getProperty('distributionSha256Sum')
        if (!(distributionUrl ==~ /^https:\/\/services[.]gradle[.]org\/distributions\/gradle-[^\/]+-(bin|all)[.]zip$/)) {
            violations << "Gradle wrapper distributionUrl must use https://services.gradle.org/distributions/gradle-<version>-bin.zip or -all.zip"
        }
        if (!(distributionSha256Sum ==~ /[0-9a-f]{64}/)) {
            violations << 'Gradle wrapper distributionSha256Sum must be a pinned lowercase SHA-256 value'
        }

        if (!violations.empty) {
            throw new GradleException("Gradle wrapper security verification failed:\n" + violations.collect { "  - ${it}" }.join('\n'))
        }

        logger.lifecycle("Verified Gradle wrapper checksums and distribution metadata.")
    }
}

tasks.register('verifyReleaseBuilderImage') {
    group = 'verification'
    description = 'Verifies the Linux release-builder Dockerfile pins its base image and release-sensitive defaults.'

    inputs.file(linuxReleaseBuilderDockerfile)
    inputs.property('expectedReleaseJavaVersion', expectedReleaseJavaVersion)
    outputs.upToDateWhen { false }

    doLast {
        def dockerfile = linuxReleaseBuilderDockerfile.asFile
        if (!dockerfile.file) {
            throw new GradleException("Missing Linux release-builder Dockerfile: ${dockerfile}")
        }

        def expectedJavaVersionValue = expectedReleaseJavaVersion.orNull
        if (!expectedJavaVersionValue) {
            throw new GradleException('Missing releaseBuild.javaVersion in gradle.properties')
        }

        def text = dockerfile.getText(StandardCharsets.UTF_8.name())
        def trimmedLines = dockerfile.readLines(StandardCharsets.UTF_8.name()).collect { it.trim() }
        def fromLine = trimmedLines.find { it.startsWith('FROM ') }
        def snapshotLine = trimmedLines.find { it.startsWith('ARG UBUNTU_APT_SNAPSHOT=') }
        def expectedBaseImage = "azul/zulu-openjdk:${expectedJavaVersionValue}"
        def violations = []

        if (!(fromLine ==~ /^FROM --platform=linux\/amd64 ${java.util.regex.Pattern.quote(expectedBaseImage)}@sha256:[0-9a-f]{64}$/)) {
            violations << "Dockerfile FROM must pin linux/amd64 ${expectedBaseImage} by lowercase sha256 digest"
        }
        if (!(snapshotLine ==~ /^ARG UBUNTU_APT_SNAPSHOT=\d{8}T\d{6}Z$/)) {
            violations << 'Dockerfile must define UBUNTU_APT_SNAPSHOT as an exact UTC timestamp, for example 20260501T000000Z'
        }
        if (!text.contains('APT::Snapshot "%s";') || !text.contains('$UBUNTU_APT_SNAPSHOT')) {
            violations << 'Dockerfile must write apt snapshot configuration from UBUNTU_APT_SNAPSHOT'
        }
        if (!(text =~ /\bapt-get install -y --no-install-recommends\b/)) {
            violations << 'Dockerfile apt installs must use --no-install-recommends'
        }
        if (text =~ /\bapt(-get)?\s+(dist-)?upgrade\b/) {
            violations << 'Dockerfile must not run apt upgrade or dist-upgrade'
        }
        if (!text.contains('rm -rf /var/lib/apt/lists/*')) {
            violations << 'Dockerfile must remove apt package lists after installation'
        }

        [
                'LANG=C.UTF-8',
                'LC_ALL=C.UTF-8',
                'TZ=UTC',
                'SOURCE_DATE_EPOCH=0',
                'HOME=/tmp/bisq-home',
                'GRADLE_USER_HOME=/tmp/bisq-home/.gradle'
        ].each { expectedText ->
            if (!text.contains(expectedText)) {
                violations << "Dockerfile must set ${expectedText}"
            }
        }

        [
                'binutils',
                'coreutils',
                'cpio',
                'dpkg-dev',
                'fakeroot',
                'file',
                'git',
                'gnupg',
                'gzip',
                'rpm',
                'tar',
                'unzip',
                'xz-utils',
                'zip'
        ].each { packageName ->
            if (!(text =~ /(?m)^\s*${java.util.regex.Pattern.quote(packageName)}\s*;?\s*\\?$/)) {
                violations << "Dockerfile must install ${packageName}"
            }
        }

        if (!trimmedLines.contains('CMD ["./gradlew", "verifyReleaseBuild"]')) {
            violations << 'Dockerfile default command must run ./gradlew verifyReleaseBuild'
        }

        if (!violations.empty) {
            throw new GradleException("Linux release-builder image verification failed:\n" + violations.collect { "  - ${it}" }.join('\n'))
        }

        logger.lifecycle("Verified Linux release-builder Dockerfile: ${rootProject.relativePath(dockerfile)}")
    }
}

tasks.register('verifyGithubActionsSecurity') {
    group = 'verification'
    description = 'Verifies GitHub Actions workflows use pinned actions and non-floating build environments.'

    def workflowFiles = fileTree('.github/workflows') {
        include '*.yml'
        include '*.yaml'
    }

    inputs.files(workflowFiles)
    outputs.upToDateWhen { false }

    doLast {
        def violations = []
        workflowFiles.files.sort { left, right -> left.path <=> right.path }.each { workflowFile ->
            def lines = workflowFile.readLines(StandardCharsets.UTF_8.name())
            lines.eachWithIndex { line, index ->
                def lineNumber = index + 1
                def usesMatcher = line =~ /^\s*-?\s*uses:\s*([^#\s]+)/
                if (usesMatcher.find()) {
                    def actionRef = usesMatcher.group(1)
                    if (!actionRef.startsWith('./')) {
                        def atIndex = actionRef.lastIndexOf('@')
                        def ref = atIndex >= 0 ? actionRef.substring(atIndex + 1) : ''
                        if (!(ref ==~ /[0-9a-fA-F]{40}/)) {
                            violations << "${rootProject.relativePath(workflowFile)}:${lineNumber} uses '${actionRef}' without a full 40-character commit SHA"
                        }
                    }

                    if (actionRef.startsWith('actions/checkout@')) {
                        def checkoutStepLines = []
                        for (int nextLineIndex = index + 1; nextLineIndex < lines.size(); nextLineIndex++) {
                            def nextLine = lines[nextLineIndex]
                            if (nextLine ==~ /^\s*-\s+(name|uses):\s+.*/) {
                                break
                            }
                            checkoutStepLines << nextLine
                        }

                        if (!checkoutStepLines.any { it ==~ /^\s*persist-credentials:\s*false\s*$/ }) {
                            violations << "${rootProject.relativePath(workflowFile)}:${lineNumber} uses actions/checkout without persist-credentials: false"
                        }
                    }
                }

                if (line ==~ /(?i).*\b(ubuntu|macos|windows)-latest\b.*/) {
                    violations << "${rootProject.relativePath(workflowFile)}:${lineNumber} uses a floating GitHub runner label: ${line.trim()}"
                }

                if (line ==~ /^\s*java-version:\s*['"]?\d+['"]?\s*$/) {
                    violations << "${rootProject.relativePath(workflowFile)}:${lineNumber} uses a floating Java major version: ${line.trim()}"
                }

                if (line ==~ /^\s*java:\s*\[\s*['"]?\d+['"]?\s*\]\s*$/) {
                    violations << "${rootProject.relativePath(workflowFile)}:${lineNumber} uses a floating Java major version in a matrix: ${line.trim()}"
                }

                if (line ==~ /^\s*check-latest:\s*true\s*$/) {
                    violations << "${rootProject.relativePath(workflowFile)}:${lineNumber} sets check-latest: true"
                }
            }
        }

        if (!violations.empty) {
            throw new GradleException("GitHub Actions security verification failed:\n" + violations.collect { "  - ${it}" }.join('\n'))
        }

        logger.lifecycle("Verified ${workflowFiles.files.size()} GitHub Actions workflow files.")
    }
}

tasks.register('generateJarHashes') {
    group = 'verification'
    description = 'Builds all project Jar task outputs and writes a canonical SHA-256 and size manifest.'

    def jarTasks = provider {
        enabledJarTasks()
    }

    dependsOn { jarTasks.get() }
    inputs.files(provider {
        jarTasks.get()
                .collect { jarTask -> jarTask.archiveFile.get().asFile }
                .findAll { it.exists() }
    })

    def outputFile = layout.buildDirectory.file('reports/checksums/jars.sha256')
    outputs.file(outputFile)

    doLast {
        def lines = jarTasks.get()
                .collect { jarTask -> jarTask.archiveFile.get().asFile }
                .findAll { it.exists() }
                .collect { jarFile ->
                    def path = canonicalPath(jarFile)
                    [
                            path: path,
                            line: "${sha256(jarFile)}  ${jarFile.length()}  ${path}"
                    ]
                }
                .sort { left, right -> left.path <=> right.path }
                .collect { it.line }

        def output = outputFile.get().asFile
        output.parentFile.mkdirs()
        output.setText(lines.join('\n') + '\n', StandardCharsets.UTF_8.name())

        logger.lifecycle("Wrote ${lines.size()} jar checksums to ${rootProject.relativePath(output)}")
    }
}

tasks.register('generateReleaseManifest') {
    group = 'verification'
    description = 'Builds the desktop Java payload and writes canonical SHA-256 release manifests.'

    def desktopInstallDist = project(':desktop').tasks.named('installDist')
    def jarTasks = provider {
        enabledJarTasks()
    }
    def desktopLibDir = project(':desktop').layout.buildDirectory.dir('install/desktop/lib')

    dependsOn tasks.named('generateJarHashes')
    dependsOn desktopInstallDist

    inputs.files(provider {
        def jarFiles = jarTasks.get()
                .collect { jarTask -> jarTask.archiveFile.get().asFile }
                .findAll { it.exists() }
        def libDir = desktopLibDir.get().asFile
        def desktopPayloadFiles = libDir.exists()
                ? libDir.listFiles().findAll { it.isFile() }
                : []
        jarFiles + desktopPayloadFiles
    })

    outputs.file(releaseSha256SumsFile)
    outputs.file(releaseManifestFile)
    outputs.file(releaseBuildInfoFile)
    outputs.upToDateWhen { false }

    doLast {
        def jarFiles = jarTasks.get()
                .collect { jarTask -> jarTask.archiveFile.get().asFile }
                .findAll { it.exists() }
        def libDir = desktopLibDir.get().asFile
        if (!libDir.directory) {
            throw new GradleException("Missing desktop Java payload directory: ${libDir}")
        }

        def desktopPayloadFiles = libDir.listFiles().findAll { it.isFile() }
        def entries = manifestEntriesFor(jarFiles + desktopPayloadFiles)

        def sha256Sums = releaseSha256SumsFile.get().asFile
        sha256Sums.parentFile.mkdirs()
        sha256Sums.setText(
                entries.collect { "${it.sha256}  ${it.path}" }.join('\n') + '\n',
                StandardCharsets.UTF_8.name()
        )

        def releaseManifest = releaseManifestFile.get().asFile
        releaseManifest.setText(
                (['sha256\tsize_bytes\tpath'] +
                        entries.collect { "${it.sha256}\t${it.size}\t${it.path}" }).join('\n') + '\n',
                StandardCharsets.UTF_8.name()
        )

        def buildInfoFile = releaseBuildInfoFile.get().asFile
        writeBuildInfo(buildInfoFile, buildInfoForManifest(entries, releaseManifest, sha256Sums))

        logger.lifecycle("Wrote ${entries.size()} release manifest entries to ${rootProject.relativePath(releaseManifest)}")
        logger.lifecycle("Wrote ${entries.size()} release checksums to ${rootProject.relativePath(sha256Sums)}")
        logger.lifecycle("Wrote release build info to ${rootProject.relativePath(buildInfoFile)}")
    }
}

tasks.register('generateReleaseEvidenceBundle', Zip) {
