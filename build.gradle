tasks.register('verifyInstallerManifest') {
    group = 'verification'
    description = 'Builds desktop OS installer artifacts and verifies them against -PinstallerManifest=<file-directory-or-zip>.'

    def expectedInstallerManifestProperty = providers.gradleProperty('installerManifest')

    dependsOn tasks.named('generateInstallerManifest')
    inputs.property('expectedInstallerManifest', expectedInstallerManifestProperty.orElse(''))
    inputs.file(installerManifestFile)
            .withPropertyName('actualInstallerManifest')

    doLast {
        def expectedInstallerManifestPath = expectedInstallerManifestProperty.orNull
        if (!expectedInstallerManifestPath) {
            throw new GradleException('Missing required -PinstallerManifest=<path-to-installer-manifest.tsv-directory-or-zip>')
        }

        def expectedManifest = resolveInstallerManifestFile(file(expectedInstallerManifestPath))
        def actualManifest = installerManifestFile.get().asFile
        if (expectedManifest.canonicalFile == actualManifest.canonicalFile) {
            logger.warn("Expected installer manifest points at the generated local manifest: ${expectedManifest}")
        }

        verifyManifestMatches('Installer manifest', expectedManifest, actualManifest)
    }
}

