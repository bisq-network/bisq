                            dpkgDeb  : commandVersionInfo(['dpkg-deb', '--version']),
                            dpkgQuery: commandVersionInfo(['dpkg-query', '--version']),
                            rpm      : commandVersionInfo(['rpm', '--version']),
                            rpm2cpio : commandVersionInfo(['rpm2cpio', '--version']),
                            rpmbuild : commandVersionInfo(['rpmbuild', '--version']),
