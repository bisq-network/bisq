tasks.register('generateInstallerStructureReport') {
    group = 'verification'
    description = 'Writes investigation reports for installer package internals where local tools are available.'

    def desktopInstallerDir = project(':desktop').layout.buildDirectory.dir('packaging/jpackage/packages')

    dependsOn tasks.named('generateInstallerManifest')

    inputs.files(provider {
        installerArtifactsIn(desktopInstallerDir.get().asFile)
    })
            .withPropertyName('installerArtifacts')
            .withPathSensitivity(org.gradle.api.tasks.PathSensitivity.RELATIVE)
    outputs.file(installerStructureReportFile)
    outputs.dir(installerStructureReportDir)
    outputs.upToDateWhen { false }

    doLast {
        def installerFiles = installerArtifactsIn(desktopInstallerDir.get().asFile)
        def reportDir = installerStructureReportDir.get().asFile
        project.delete(reportDir)
        reportDir.mkdirs()
        def normalizeReportOutput = { String value ->
            value == null ? null : value.replace(rootProject.projectDir.absolutePath, '<repo>')
        }
        def powershellSingleQuoted = { String value ->
            "'${value.replace("'", "''")}'"
        }
        def shellSingleQuoted = { String value ->
            "'${value.replace("'", "'\"'\"'")}'"
        }
        def powershellInstallerMetadataCommand = { File file ->
            def literalPath = powershellSingleQuoted(file.absolutePath)
            [
                    'powershell',
                    '-NoProfile',
                    '-ExecutionPolicy',
                    'Bypass',
                    '-Command',
                    "\$item = Get-Item -LiteralPath ${literalPath}; \$item | Select-Object FullName,Length,CreationTimeUtc,LastWriteTimeUtc,Attributes | Format-List *; \$item.VersionInfo | Format-List *; Get-AuthenticodeSignature -LiteralPath ${literalPath} | Format-List *"
            ]
        }
        def powershellMsiPropertiesCommand = { File file ->
            def literalPath = powershellSingleQuoted(file.absolutePath)
            [
                    'powershell',
                    '-NoProfile',
                    '-ExecutionPolicy',
                    'Bypass',
                    '-Command',
                    "\$path = ${literalPath}; \$installer = New-Object -ComObject WindowsInstaller.Installer; \$database = \$installer.OpenDatabase(\$path, 0); \$view = \$database.OpenView('SELECT `Property`, `Value` FROM `Property` ORDER BY `Property`'); \$view.Execute(); while (\$record = \$view.Fetch()) { '{0}={1}' -f \$record.StringData(1), \$record.StringData(2) }"
            ]
        }
        def powershellPeHeaderCommand = { File file ->
            def literalPath = powershellSingleQuoted(file.absolutePath)
            [
                    'powershell',
                    '-NoProfile',
                    '-ExecutionPolicy',
                    'Bypass',
                    '-Command',
                    "\$bytes = [System.IO.File]::ReadAllBytes(${literalPath}); if (\$bytes.Length -lt 64) { throw 'File is too small to contain a PE header.' }; \$peOffset = [BitConverter]::ToInt32(\$bytes, 0x3c); if (\$peOffset -lt 0 -or \$peOffset + 24 -gt \$bytes.Length) { throw \"Invalid PE header offset: \$peOffset\" }; \$signature = [System.Text.Encoding]::ASCII.GetString(\$bytes, \$peOffset, 4); \$machine = [BitConverter]::ToUInt16(\$bytes, \$peOffset + 4); \$sections = [BitConverter]::ToUInt16(\$bytes, \$peOffset + 6); \$timestamp = [BitConverter]::ToUInt32(\$bytes, \$peOffset + 8); \$optionalHeaderSize = [BitConverter]::ToUInt16(\$bytes, \$peOffset + 20); \$characteristics = [BitConverter]::ToUInt16(\$bytes, \$peOffset + 22); [PSCustomObject]@{ PEHeaderOffset = \$peOffset; Signature = \$signature; Machine = ('0x{0:X4}' -f \$machine); NumberOfSections = \$sections; TimeDateStamp = \$timestamp; TimeDateStampUtc = [DateTimeOffset]::FromUnixTimeSeconds([int64]\$timestamp).UtcDateTime.ToString('o'); SizeOfOptionalHeader = \$optionalHeaderSize; Characteristics = ('0x{0:X4}' -f \$characteristics) } | Format-List *"
            ]
        }
        def osName = System.getProperty('os.name').toLowerCase(Locale.ROOT)
        def macos = osName.contains('mac')
        def windows = osName.contains('windows')

        def rows = ['artifact_path\tartifact_sha256\tformat\tstatus\treport_path\tmessage']
        installerFiles.each { installerFile ->
            def artifactPath = canonicalPath(installerFile)
            def extension = installerFile.name.contains('.')
                    ? installerFile.name.substring(installerFile.name.lastIndexOf('.') + 1).toLowerCase(Locale.ROOT)
                    : ''
            def reportName = artifactPath.replaceAll(/[^A-Za-z0-9._-]/, '_') + '.txt'
            def reportFile = new File(reportDir, reportName)
            def commands = [[label: 'File type', command: ['file', installerFile.absolutePath], optional: true]]
            def message = ''

            if (extension == 'deb') {
                def debPath = shellSingleQuoted(installerFile.absolutePath)
                def debTarListingCommand = { String dpkgDebOption ->
                    [
                            'sh',
                            '-c',
                            "dpkg-deb ${dpkgDebOption} ${debPath} | tar --list --verbose --full-time --numeric-owner --file -"
                    ]
                }
                def debArchiveMemberHashesCommand = [
                        'sh',
                        '-c',
                        "ar t ${debPath} | while IFS= read -r member; do printf '%s  ' \"\$member\"; ar p ${debPath} \"\$member\" | sha256sum | cut -d ' ' -f 1; done"
                ]
                commands << [label: 'Debian archive members', command: ['ar', 'tv', installerFile.absolutePath]]
                commands << [label: 'Debian archive member hashes', command: debArchiveMemberHashesCommand]
                commands << [label: 'Debian package fields', command: ['dpkg-deb', '--field', installerFile.absolutePath]]
                commands << [label: 'Debian package contents', command: ['dpkg-deb', '--contents', installerFile.absolutePath]]
                commands << [label: 'Debian control archive contents', command: debTarListingCommand('--ctrl-tarfile')]
                commands << [label: 'Debian data archive contents', command: debTarListingCommand('--fsys-tarfile')]
            } else if (extension == 'rpm') {
                commands << [label: 'RPM package checks', command: ['rpm', '-Kv', installerFile.absolutePath], optional: true]
                commands << [label: 'RPM package info', command: ['rpm', '-qip', installerFile.absolutePath]]
                commands << [
                        label   : 'RPM payload archive contents',
                        command : ['sh', '-c', "rpm2cpio ${shellSingleQuoted(installerFile.absolutePath)} | cpio --list --verbose --numeric-uid-gid"],
                        optional: true
                ]
                commands << [
                        label  : 'RPM build metadata',
                        command: [
                                'rpm',
                                '-qp',
                                '--queryformat',
                                'Name: %{NAME}\nVersion: %{VERSION}\nRelease: %{RELEASE}\nArchitecture: %{ARCH}\nBuild time: %{BUILDTIME:date}\nBuild host: %{BUILDHOST}\nSource RPM: %{SOURCERPM}\nPayload compressor: %{PAYLOADCOMPRESSOR}\nPayload flags: %{PAYLOADFLAGS}\n',
                                installerFile.absolutePath
                        ]
                ]
                commands << [label: 'RPM package dump', command: ['rpm', '-qp', '--dump', installerFile.absolutePath]]
            } else if (extension == 'dmg' && macos) {
                commands << [label: 'DMG image info', command: ['hdiutil', 'imageinfo', installerFile.absolutePath]]
                commands << [label: 'DMG image verification', command: ['hdiutil', 'verify', installerFile.absolutePath]]
            } else if (extension == 'pkg' && macos) {
                commands << [label: 'macOS package signature', command: ['pkgutil', '--check-signature', installerFile.absolutePath]]
                commands << [label: 'macOS package payload files', command: ['pkgutil', '--payload-files', installerFile.absolutePath]]
                commands << [label: 'macOS package archive members', command: ['xar', '-tf', installerFile.absolutePath], optional: true]
            } else if ((extension == 'exe' || extension == 'msi') && windows) {
                commands << [label: 'Windows installer metadata', command: powershellInstallerMetadataCommand(installerFile)]
                if (extension == 'exe') {
                    commands << [label: 'Windows PE header', command: powershellPeHeaderCommand(installerFile), optional: true]
                }
                if (extension == 'msi') {
                    commands << [label: 'Windows MSI properties', command: powershellMsiPropertiesCommand(installerFile), optional: true]
                }
            } else {
                message = "No installer structure inspector is configured for .${extension ?: 'unknown'} artifacts."
            }

            def status = 'skipped'
            if (!commands.empty) {
                def report = new StringBuilder()
                report << "artifact: ${artifactPath}\n"
                report << "sha256: ${sha256(installerFile)}\n"
                report << "format: ${extension}\n"
                def failures = []
                def requiredCommands = commands.findAll { !it.optional }

                commands.each { commandSpec ->
                    def displayCommand = commandSpec.command.collect {
                        normalizeReportOutput(it == installerFile.absolutePath ? artifactPath : it)
                    }
                    def result = execResult(commandSpec.command)
                    report << "\n## ${commandSpec.label}\n\n"
                    report << "command: ${displayCommand.join(' ')}\n"
                    report << "exitValue: ${result.exitValue == null ? 'not-run' : result.exitValue}\n"
                    if (result.stdout) {
                        report << "\nstdout:\n${normalizeReportOutput(result.stdout)}\n"
                    }
                    if (result.stderr) {
                        report << "\nstderr:\n${normalizeReportOutput(result.stderr)}\n"
                    }
                    if (result.exitValue != 0 && !commandSpec.optional) {
                        failures << commandSpec.label
                    }
                }

                reportFile.setText(report.toString(), StandardCharsets.UTF_8.name())
                if (!requiredCommands.empty) {
                    status = failures.empty ? 'generated' : 'failed'
                    message = failures.empty ? '' : "Inspector command failed: ${failures.join(', ')}"
                }
            }

            def reportPath = reportFile.file ? canonicalPath(reportFile) : ''
            rows << [artifactPath, sha256(installerFile), extension, status, reportPath, message]
                    .collect { it.replace('\t', ' ').replace('\n', ' ') }
                    .join('\t')
        }

        def structureReport = installerStructureReportFile.get().asFile
        structureReport.parentFile.mkdirs()
        structureReport.setText(rows.join('\n') + '\n', StandardCharsets.UTF_8.name())

        logger.lifecycle("Wrote installer structure report to ${rootProject.relativePath(structureReport)}")
    }
}

tasks.register('generateInstallerEvidenceBundle', Zip) {
    group = 'verification'
    description = 'Packages installer manifest evidence into one reproducible ZIP for signing and publishing.'

    dependsOn tasks.named('generateInstallerStructureReport')

    def requiredEvidenceFiles = [
            installerManifestFile,
            installerSha256SumsFile,
            installerBuildInfoFile,
            installerStructureReportFile
    ]
    def structureReportFiles = {
        def structureReport = installerStructureReportFile.get().asFile
        if (!structureReport.file) {
            return []
        }
        structureReport.readLines(StandardCharsets.UTF_8.name())
                .drop(1)
                .collect { it.split('\t', -1) }
                .findAll { columns -> columns.length >= 5 && columns[4] }
                .collect { columns -> file(columns[4]) }
    }
    def structureDirectoryFiles = {
        def structureDir = installerStructureReportDir.get().asFile
        structureDir.directory
                ? fileTree(structureDir).files
                .findAll { it.file }
                .sort { left, right -> left.path <=> right.path }
                : []
    }

    archiveFileName = 'installer-evidence.zip'
    destinationDirectory = releaseReportDir
    preserveFileTimestamps = false
    reproducibleFileOrder = true

    from(installerManifestFile)
    from(installerSha256SumsFile)
    from(installerBuildInfoFile)
    from(installerStructureReportFile)
    from(installerStructureReportDir) {
        into 'installer-structure'
    }

    doFirst {
        def missingFiles = []
        requiredEvidenceFiles.each { provider ->
            def requiredFile = provider.get().asFile
            if (!requiredFile.file) {
                missingFiles << canonicalPath(requiredFile)
            }
        }

        def structureDir = installerStructureReportDir.get().asFile
        if (!structureDir.directory) {
            missingFiles << canonicalPath(structureDir)
        }

        if (missingFiles.empty) {
            structureReportFiles().each { reportFile ->
                if (!reportFile.file) {
                    missingFiles << canonicalPath(reportFile)
                }
            }
        }

        if (!missingFiles.empty) {
            throw new GradleException(
                    "Cannot package installer evidence because required files are missing:\n" +
                            missingFiles.unique().sort().collect { "  - ${it}" }.join('\n') +
                            "\nRun ./gradlew generateInstallerStructureReport to regenerate installer evidence."
            )
        }
    }

    doLast {
        def bundle = archiveFile.get().asFile
        def expectedEntries = new TreeSet<String>()
        requiredEvidenceFiles.each { provider ->
            expectedEntries << provider.get().asFile.name
        }
        def structureDir = installerStructureReportDir.get().asFile
        structureDirectoryFiles().each { reportFile ->
            def relativeStructurePath = structureDir.toPath()
                    .relativize(reportFile.toPath())
                    .toString()
                    .replace(File.separatorChar, '/' as char)
            expectedEntries << "installer-structure/${relativeStructurePath}"
        }

        def actualEntries = new TreeSet<String>()
        new ZipFile(bundle).withCloseable { zipFile ->
            zipFile.entries().each { entry ->
                if (!entry.directory) {
                    actualEntries << entry.name
                }
            }
        }
        def missingEntries = (expectedEntries - actualEntries).sort()
        if (!missingEntries.empty) {
            throw new GradleException(
                    "Installer evidence bundle is missing required entries:\n" +
                            missingEntries.collect { "  - ${it}" }.join('\n')
            )
        }

        logger.lifecycle("Wrote installer evidence bundle to ${rootProject.relativePath(bundle)}")
        logger.lifecycle("Installer evidence bundle SHA-256: ${sha256(bundle)}")
    }
}

