    def wrapperProperties = loadGradleWrapperProperties()
    def defaultLocale = Locale.getDefault()
    def osName = System.getProperty('os.name').toLowerCase(Locale.ROOT)
    def linux = osName.contains('linux')
    def macos = osName.contains('mac')
    def windows = osName.contains('windows')

    [
            buildInfoVersion: 1,
            manifest        : [
                    entryCount: entries.size(),
                    sha256   : sha256(manifest),
                    path     : canonicalPath(manifest)
            ],
            checksums       : [
                    sha256: sha256(checksums),
                    path  : canonicalPath(checksums)
            ],
            git             : [
                    commit    : execText(['git', 'rev-parse', 'HEAD']),
                    branch    : execText(['git', 'rev-parse', '--abbrev-ref', 'HEAD']),
                    describe  : execText(['git', 'describe', '--tags', '--always', '--dirty']),
                    dirty     : gitStatus != null && !gitStatus.empty,
                    submodules: execText(['git', 'submodule', 'status', '--recursive'])
            ],
            gradle          : [
                    version                     : gradle.gradleVersion,
                    wrapperDistributionUrl      : wrapperProperties.getProperty('distributionUrl'),
                    wrapperDistributionSha256Sum: wrapperProperties.getProperty('distributionSha256Sum'),
