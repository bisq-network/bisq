def normalizeCommandOutput = { Object value ->
    value == null
            ? null
            : value.toString()
            .replace('\r\n', '\n')
            .replace('\r', '\n')
            .trim()
}

def firstNonEmptyLine = { String value ->
    value == null
            ? null
            : value.readLines().collect { it.trim() }.find { !it.empty }
}

def compactMap = { Map<String, Object> values ->
    values.findAll { entry ->
        def value = entry.value
        value != null &&
                (!(value instanceof CharSequence) || value.length() > 0) &&
                (!(value instanceof Map) || !value.empty)
    }
}

def execResult = { List<String> command ->
    def output = new ByteArrayOutputStream()
    def errorOutput = new ByteArrayOutputStream()
    try {
        def result = exec {
            commandLine command
            standardOutput = output
            errorOutput = errorOutput
            ignoreExitValue = true
        }
        [
                exitValue: result.exitValue,
                stdout   : normalizeCommandOutput(output.toString(StandardCharsets.UTF_8.name())),
                stderr   : normalizeCommandOutput(errorOutput.toString(StandardCharsets.UTF_8.name()))
        ]
    } catch (Exception ignored) {
        [
                exitValue: null,
                stdout   : null,
                stderr   : null
        ]
    }
}

def execText = { List<String> command ->
    def result = execResult(command)
    result.exitValue == 0 ? result.stdout : null
}

def commandOutputInfo = { List<String> command, List<String> displayCommand = command ->
    def result = execResult(command)
    def output = result.stdout ?: result.stderr
    compactMap([
            command  : displayCommand,
            available: result.exitValue == 0,
            exitValue: result.exitValue,
            output   : output
    ])
}

def commandVersionInfo = { List<String> command, List<String> displayCommand = command ->
    def result = execResult(command)
    def output = result.stdout ?: result.stderr
    compactMap([
            command  : displayCommand,
            available: result.exitValue == 0,
            exitValue: result.exitValue,
            version  : firstNonEmptyLine(output)
    ])
}

def jdkToolVersionInfo = { String executable ->
    def windows = System.getProperty('os.name').toLowerCase(Locale.ROOT).contains('windows')
    def executableName = windows ? "${executable}.exe" : executable
    def toolFile = new File(System.getProperty('java.home'), "bin/${executableName}")
    def command = toolFile.file ? [toolFile.absolutePath, '--version'] : [executable, '--version']
    def info = commandVersionInfo(command, [executable, '--version'])
    info.source = toolFile.file ? 'java.home' : 'PATH'
    info
}

def readOsRelease = {
    def osReleaseFile = ['/etc/os-release', '/usr/lib/os-release']
            .collect { new File(it) }
            .find { it.file }
    if (osReleaseFile == null) {
        return null
    }

    def values = new TreeMap<String, String>()
    osReleaseFile.eachLine(StandardCharsets.UTF_8.name()) { line ->
        def trimmed = line.trim()
        if (trimmed && !trimmed.startsWith('#') && trimmed.contains('=')) {
            def parts = trimmed.split('=', 2)
            def value = parts[1].trim()
            if (value.startsWith('"') && value.endsWith('"')) {
                value = value.substring(1, value.length() - 1)
                        .replace('\\"', '"')
                        .replace('\\\\', '\\')
            } else if (value.startsWith("'") && value.endsWith("'")) {
                value = value.substring(1, value.length() - 1)
            }
            values[parts[0]] = value
        }
    }

    [
            path  : osReleaseFile.path,
            values: values
    ]
}

