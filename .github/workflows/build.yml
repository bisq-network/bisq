name: Build Bisq

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            os: [ubuntu-latest, macOS-latest, windows-latest]
            java: [ '21' ]
    name: Test Java ${{ matrix.java }}, ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6.0.2
      with:
          submodules: 'true'

    - name: Set up JDK
      uses: actions/setup-java@v5.2.0
      with:
        java-version: ${{ matrix.java }}
        distribution: 'zulu'

    - name: Build with Gradle
      uses: gradle/gradle-build-action@v3.5.0
      with:
        arguments: build verifyReproducibleArchives generateReleaseManifest --scan

    - name: Upload release manifests
      uses: actions/upload-artifact@v4
      with:
        name: release-manifests-${{ matrix.os }}-java-${{ matrix.java }}
        path: |
          build/reports/release/SHA256SUMS
          build/reports/release/release-manifest.tsv
          build/reports/release/build-info.json
        if-no-files-found: error
