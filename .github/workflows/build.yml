name: Build Bisq

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            os: [ubuntu-24.04, macos-15, windows-2025]
            java: [ '21.0.6' ]
    name: Test Java ${{ matrix.java }}, ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          submodules: 'true'

    - name: Verify Gradle wrapper checksums
      shell: bash
      run: |
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c gradle/wrapper/gradle-wrapper.sha256
        else
          shasum -a 256 -c gradle/wrapper/gradle-wrapper.sha256
        fi

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ matrix.java }}
        distribution: 'zulu'
        check-latest: false

    - name: Build with Gradle
      uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0
      with:
        arguments: verifyReleaseBuild --scan

    - name: Upload release manifests
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: release-manifests-${{ matrix.os }}-java-${{ matrix.java }}
        path: |
          build/reports/release/SHA256SUMS
          build/reports/release/release-manifest.tsv
          build/reports/release/build-info.json
        if-no-files-found: error
