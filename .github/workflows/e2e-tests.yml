name: e2e-tests

on:
  workflow_dispatch:
    inputs:
      run_long_running_tests:
        description: "Run ONLY the long-running soak/coverage tests (@Tag(\"longrunning\")); skips the normal suite"
        type: boolean
        default: false
  pull_request:
    paths:
      # Modules whose source is directly compiled into the e2e stack.
      - "apitest/**"
      - "core/**"
      - "daemon/**"
      - "cli/**"
      - "seednode/**"
      - "proto/**"
      # Transitive deps of core/daemon/cli — a regression here lands in the stack
      # without touching the modules above.
      - "common/**"
      - "p2p/**"
      - "persistence/**"
      - "assets/**"
      - "bridge/**"
      - "bitcoind/**"
      # Build/version plumbing — any change here can swap dep versions or compile
      # behavior under us.
      - "build-logic/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/libs.versions.toml"
      - ".github/workflows/e2e-tests.yml"

jobs:
  e2e-tests:
    name: Run end-to-end DAO + trade test suite
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: zulu
          java-version: '21.0.6'
          check-latest: false

      # Cache Gradle deps + wrapper. Single biggest speedup per re-run (~2 min).
      - name: Gradle cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Pre-pull bitcoind base image in parallel with the gradle build below.
      - name: Pre-pull bitcoind image
        run: docker pull lnliz/bitcoind:29.3 &

      # Build the gradle install dists and extract dao-setup. We split this out so
      # the subsequent docker build can use buildx cache without rebuilding Bisq.
      - name: Build install dists + dao-setup
        run: |
          ./gradlew --no-daemon \
            :seednode:installDist :daemon:installDist :cli:installDist \
            :apitest:installDaoSetup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Cache the stable Docker layers (apt deps, javafx jar fetch). Bisq install
      # dists are COPYed in late layers; they invalidate on every source change
      # but the heavy bottom layers survive → ~1 min saved per run.
      - name: Cache Docker image layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('apitest/docker/Dockerfile.*', 'apitest/docker/*entrypoint.sh') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build docker images with layer cache
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            -t bisq-bitcoind:ci \
            -f apitest/docker/Dockerfile.bitcoind .
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            -t bisq-daemon:ci \
            -f apitest/docker/Dockerfile.bisq .
          # actions/cache only saves /tmp/.buildx-cache; rotate the new layers in.
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run e2e test stack (compose up + test)
        # Empty on pull_request → run-e2e-tests.sh defaults it to false (normal suite,
        # long-running tests excluded). Set true via workflow_dispatch to run ONLY them.
        env:
          RUN_LONG_RUNNING_TESTS: ${{ inputs.run_long_running_tests }}
        run: apitest/docker/run-e2e-tests.sh --skip-build --skip-docker-build

      - name: Upload container logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-tests-logs
          path: apitest/docker/logs
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-tests-reports
          path: apitest/build/reports/tests
          retention-days: 7
