name: Linux Release Builder

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-release-builder:
    name: Linux release-builder evidence, Java 21.0.6
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          submodules: 'true'
          persist-credentials: false

    - name: Verify Gradle wrapper checksums
      shell: bash
      run: |
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c gradle/wrapper/gradle-wrapper.sha256
        else
          shasum -a 256 -c gradle/wrapper/gradle-wrapper.sha256
        fi

    - name: Build Linux release-builder image
      shell: bash
      run: docker build --pull=false -t bisq-release-builder-linux:java-21.0.6 docker/release-builder/linux

    - name: Prepare clean release-builder worktrees
      shell: bash
      run: |
        mkdir -p build/release-builder-worktrees
        git worktree add --detach build/release-builder-worktrees/a "$GITHUB_SHA"
        git worktree add --detach build/release-builder-worktrees/b "$GITHUB_SHA"
        git -C build/release-builder-worktrees/a submodule update --init --recursive
        git -C build/release-builder-worktrees/b submodule update --init --recursive

    - name: Generate Linux evidence in release-builder worktree A
      shell: bash
      run: |
        docker run --rm --platform linux/amd64 \
          --user "$(id -u):$(id -g)" \
          -v "$PWD:$PWD" \
          -w "$PWD/build/release-builder-worktrees/a" \
          bisq-release-builder-linux:java-21.0.6 \
          ./gradlew clean verifyReleaseBuild verifyInstallerEvidenceBundle

    - name: Generate Linux evidence in release-builder worktree B
      shell: bash
      run: |
        docker run --rm --platform linux/amd64 \
          --user "$(id -u):$(id -g)" \
          -v "$PWD:$PWD" \
          -w "$PWD/build/release-builder-worktrees/b" \
          bisq-release-builder-linux:java-21.0.6 \
          ./gradlew clean verifyReleaseBuild verifyInstallerEvidenceBundle

    - name: Compare release-builder Java evidence
      shell: bash
      run: |
        docker run --rm --platform linux/amd64 \
          --user "$(id -u):$(id -g)" \
          -v "$PWD:/workspace" \
          -w /workspace \
          bisq-release-builder-linux:java-21.0.6 \
          ./gradlew compareReleaseEvidenceBundles \
            -PleftReleaseEvidence=build/release-builder-worktrees/a/build/reports/release/release-evidence.zip \
            -PrightReleaseEvidence=build/release-builder-worktrees/b/build/reports/release/release-evidence.zip

    - name: Compare release-builder installer evidence
      shell: bash
      run: |
        docker run --rm --platform linux/amd64 \
          --user "$(id -u):$(id -g)" \
          -v "$PWD:/workspace" \
          -w /workspace \
          bisq-release-builder-linux:java-21.0.6 \
          ./gradlew compareInstallerEvidenceBundles \
            -PleftInstallerEvidence=build/release-builder-worktrees/a/build/reports/release/installer-evidence.zip \
            -PrightInstallerEvidence=build/release-builder-worktrees/b/build/reports/release/installer-evidence.zip

    - name: Upload release-builder evidence
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: release-builder-linux-java-21.0.6
        path: |
          build/release-builder-worktrees/a/build/reports/release/SHA256SUMS
          build/release-builder-worktrees/a/build/reports/release/release-manifest.tsv
          build/release-builder-worktrees/a/build/reports/release/build-info.json
          build/release-builder-worktrees/a/build/reports/release/release-evidence.zip
        if-no-files-found: error

    - name: Upload release-builder installer evidence
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: release-builder-linux-installers-java-21.0.6
        path: |
          build/release-builder-worktrees/a/build/reports/release/INSTALLER-SHA256SUMS
          build/release-builder-worktrees/a/build/reports/release/installer-manifest.tsv
          build/release-builder-worktrees/a/build/reports/release/installer-build-info.json
          build/release-builder-worktrees/a/build/reports/release/installer-structure-summary.txt
          build/release-builder-worktrees/a/build/reports/release/installer-structure-report.tsv
          build/release-builder-worktrees/a/build/reports/release/installer-structure/**
          build/release-builder-worktrees/a/build/reports/release/installer-evidence.zip
        if-no-files-found: error
