name: Installer Evidence

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: installer-evidence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-installer-evidence:
    name: Linux installer evidence, Java 21.0.6
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          submodules: 'true'
          persist-credentials: false

    - name: Verify Gradle wrapper checksums
      shell: bash
      run: |
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c gradle/wrapper/gradle-wrapper.sha256
        else
          shasum -a 256 -c gradle/wrapper/gradle-wrapper.sha256
        fi

    - name: Install Linux packaging tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          binutils \
          cpio \
          dpkg \
          dpkg-dev \
          fakeroot \
          file \
          gzip \
          rpm \
          tar \
          xz-utils \
          zip

    - name: Set up JDK
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: '21.0.6'
        distribution: 'zulu'
        check-latest: false

    - name: Build Linux installer evidence
      uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0
      with:
        arguments: verifyInstallerEvidenceBundle --scan

    - name: Upload Linux installer evidence
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: installer-evidence-ubuntu-24.04-java-21.0.6
        path: |
          build/reports/release/INSTALLER-SHA256SUMS
          build/reports/release/installer-manifest.tsv
          build/reports/release/installer-build-info.json
          build/reports/release/installer-structure-summary.txt
          build/reports/release/installer-structure-report.tsv
          build/reports/release/installer-structure/**
          build/reports/release/installer-evidence.zip
        if-no-files-found: error

  macos-installer-evidence:
    name: macOS installer evidence, Java 21.0.6
    runs-on: macos-15
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          submodules: 'true'
          persist-credentials: false

    - name: Verify Gradle wrapper checksums
      shell: bash
      run: |
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c gradle/wrapper/gradle-wrapper.sha256
        else
          shasum -a 256 -c gradle/wrapper/gradle-wrapper.sha256
        fi

    - name: Set up JDK
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: '21.0.6'
        distribution: 'zulu'
        check-latest: false

    - name: Build macOS installer evidence
      uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0
      with:
        arguments: verifyInstallerEvidenceBundle --scan

    - name: Upload macOS installer evidence
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: installer-evidence-macos-15-java-21.0.6
        path: |
          build/reports/release/INSTALLER-SHA256SUMS
          build/reports/release/installer-manifest.tsv
          build/reports/release/installer-build-info.json
          build/reports/release/installer-structure-summary.txt
          build/reports/release/installer-structure-report.tsv
          build/reports/release/installer-structure/**
          build/reports/release/installer-evidence.zip
        if-no-files-found: error

  windows-installer-evidence:
    name: Windows installer evidence, Java 21.0.6
    runs-on: windows-2025
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          submodules: 'true'
          persist-credentials: false

    - name: Verify Gradle wrapper checksums
      shell: bash
      run: |
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c gradle/wrapper/gradle-wrapper.sha256
        else
          shasum -a 256 -c gradle/wrapper/gradle-wrapper.sha256
        fi

    - name: Install WiX Toolset
      shell: pwsh
      run: |
        choco install wixtoolset --no-progress -y
        $wixDirectory = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset v3*" |
          Sort-Object Name -Descending |
          Select-Object -First 1
        if ($null -eq $wixDirectory) {
          throw "WiX Toolset installation directory was not found."
        }
        "$($wixDirectory.FullName)\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

    - name: Set up JDK
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: '21.0.6'
        distribution: 'zulu'
        check-latest: false

    - name: Build Windows installer evidence
      uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0
      with:
        arguments: verifyInstallerEvidenceBundle --scan

    - name: Upload Windows installer evidence
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: installer-evidence-windows-2025-java-21.0.6
        path: |
          build/reports/release/INSTALLER-SHA256SUMS
          build/reports/release/installer-manifest.tsv
          build/reports/release/installer-build-info.json
          build/reports/release/installer-structure-summary.txt
          build/reports/release/installer-structure-report.tsv
          build/reports/release/installer-structure/**
          build/reports/release/installer-evidence.zip
        if-no-files-found: error
