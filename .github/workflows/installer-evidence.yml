name: Installer Evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-installer-evidence:
    name: Linux installer evidence, Java 21.0.6
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          submodules: 'true'
          persist-credentials: false

    - name: Verify Gradle wrapper checksums
      shell: bash
      run: |
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c gradle/wrapper/gradle-wrapper.sha256
        else
          shasum -a 256 -c gradle/wrapper/gradle-wrapper.sha256
        fi

    - name: Install Linux packaging tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends fakeroot rpm

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '21.0.6'
        distribution: 'zulu'
        check-latest: false

    - name: Build Linux installer evidence
      uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0
      with:
        arguments: generateInstallerEvidenceBundle --scan

    - name: Upload Linux installer evidence
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: installer-evidence-ubuntu-24.04-java-21.0.6
        path: |
          build/reports/release/INSTALLER-SHA256SUMS
          build/reports/release/installer-manifest.tsv
          build/reports/release/installer-evidence.zip
        if-no-files-found: error
